apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arc-runner-egress
  namespace: arc-runners
spec:
  podSelector:
    matchLabels:
      actions.github.com/scale-set-name: arc-runner-set
  policyTypes:
    - Egress
    - Ingress
  ingress: []  # Deny all ingress
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS (for GitHub, Azure, package registries)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HTTP (for package mirrors)
    - to: []
      ports:
        - protocol: TCP
          port: 80
